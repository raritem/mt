name: Inject cache version
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject cache version
        run: |
          VER=$(git rev-parse --short HEAD)
          echo "Cache version: $VER"
          find . -name "index.html" \
            -not -path "./.git/*" \
            -exec sed -i "s/__CACHE_VER__/$VER/g" {} +

      - name: Commit injected files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "ci: inject cache version $VER"
          git push
