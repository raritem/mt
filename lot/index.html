<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лот — WoT Shop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/gallery.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
</head>
<body>
  <div class="stars" id="stars"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <span class="logo-icon">🎯</span>
        <span class="logo-text">WoT<span class="logo-accent">Shop</span></span>
      </a>
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>
  </header>

  <main class="container">
    <div class="lot-header" id="lot-header"></div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Лайтбокс -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-bg" id="lb-bg"></div>

    <!-- Миниатюры СВЕРХУ -->
    <div class="lb-thumbnails" id="lb-thumbnails"></div>

    <!-- Кнопка закрыть — всегда видима -->
    <button class="lb-close" id="lb-close" aria-label="Закрыть">
      <i data-lucide="x" width="22" height="22"></i>
    </button>

    <!-- Стрелки -->
    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Предыдущее">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="lb-stage" id="lb-stage">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lb-img" src="" alt="Скриншот аккаунта">
      </div>
    </div>

    <button class="lb-arrow lb-next" id="lb-next" aria-label="Следующее">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Тулбар СНИЗУ (без кнопки сброса) -->
    <div class="lb-toolbar" id="lb-toolbar">
      <button class="lb-tool" id="lb-zoom-in" aria-label="Увеличить">
        <i data-lucide="zoom-in" width="18" height="18"></i>
      </button>
      <button class="lb-tool" id="lb-zoom-out" aria-label="Уменьшить">
        <i data-lucide="zoom-out" width="18" height="18"></i>
      </button>
      <span class="lb-counter" id="lb-counter">1 / 1</span>
    </div>
  </div>

  <footer class="site-footer">
    <p>Все аккаунты продаются через <img src="https://funpay.com/img/layout/logo-funpay.svg" alt="FunPay" height="14" style="vertical-align:middle"> — безопасная сделка гарантирована.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/gallery.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
    loadLot();
  </script>
</body>
</html>
