<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Галерея — TANKNEXUS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="../css/main.css?v=b83f9e5">
  <link rel="stylesheet" href="../css/gallery.css?v=b83f9e5">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="../gallery/" class="logo">
        <img src="../logo.svg" alt="TANKNEXUS" class="logo-img">
      </a>
      <button id="header-fav-btn" class="header-fav-btn" aria-label="Избранное" type="button">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.45067 13.9082L11.4033 20.4395C11.6428 20.6644 11.7625 20.7769 11.9037 20.8046C11.9673 20.8171 12.0327 20.8171 12.0963 20.8046C12.2375 20.7769 12.3572 20.6644 12.5967 20.4395L19.5493 13.9082C21.5055 12.0706 21.743 9.0466 20.0978 6.92607L19.7885 6.52734C17.8203 3.99058 13.8696 4.41601 12.4867 7.31365C12.2913 7.72296 11.7087 7.72296 11.5133 7.31365C10.1304 4.41601 6.17972 3.99058 4.21154 6.52735L3.90219 6.92607C2.25695 9.0466 2.4945 12.0706 4.45067 13.9082Z" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="lots-grid" class="lots-grid">
      <div class="loading-spinner">
        <div class="spinner"></div>
      </div>
    </div>

    <section class="lots-table-section" id="lots-table-section" style="display:none">
      <div class="lots-table-header">
        <h2 class="lots-table-title">Ещё аккаунты</h2>
        <div class="lots-view-toggle" id="lots-view-toggle">
          <button class="view-toggle-btn active" id="view-btn-grid" data-view="grid" title="Карточки" aria-label="Вид карточками">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-toggle-btn" id="view-btn-table" data-view="table" title="Таблица" aria-label="Вид таблицей">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="lots-table-filters" id="lots-table-filters">
        <div class="filter-row">
          <input type="text" id="lots-filter-q" placeholder="Поиск" autocomplete="off">
        </div>
      </div>

      <div id="lots-table-container">
        <!-- Заполняется JS: либо lots-grid-secondary, либо lots-table -->
        <div class="lots-grid lots-grid--secondary" id="lots-table" style="display:none">
          <!-- Карточки лотов -->
        </div>
        <div class="lots-table-rows" id="lots-table-rows" style="display:none">
          <!-- Строки таблицы -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Все аккаунты продаются через&nbsp;<img src="https://funpay.com/img/layout/logo-funpay.svg" alt="FunPay" class="funpay-logo-footer">&nbsp;— безопасная сделка гарантирована.</p>
  </footer>

  <!-- Лайтбокс -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-bg" id="lb-bg"></div>
    <div class="lb-thumbnails" id="lb-thumbnails">
      <div class="lb-tn-row" id="lb-tn-row"></div>
      <div class="lb-nav-counter" id="lb-counter">1 / 1</div>
    </div>
    <button class="lb-back" id="lb-back" aria-label="Назад">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </button>
    <button class="lb-close" id="lb-close" aria-label="Закрыть">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Предыдущее">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lb-stage" id="lb-stage">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lb-img" src="" alt="Скриншот аккаунта">
      </div>
    </div>
    <button class="lb-arrow lb-next" id="lb-next" aria-label="Следующее">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lb-toolbar" id="lb-toolbar">
      <div class="lb-toolbar-pill">
        <button class="lb-tool" id="lb-zoom-in" aria-label="Увеличить" title="+">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <div class="lb-divider"></div>
        <button class="lb-tool" id="lb-zoom-out" aria-label="Уменьшить" title="-">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="../js/resources.js?v=b83f9e5"></script>
  <script src="../js/main.js?v=b83f9e5"></script>
  <script src="../js/gallery.js?v=b83f9e5"></script>
  <script src="../js/quickview.js?v=b83f9e5"></script>
  <script>
    loadCatalogue();
  </script>
</body>
</html>
