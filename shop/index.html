<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Витрина — WoT Shop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="../css/main.css?v=__CACHE_VER__">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="./" class="logo">
        <span class="logo-text" id="brand-title"></span>
      </a>
      <button id="header-fav-btn" class="header-fav-btn" aria-label="Избранное" type="button">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.45067 13.9082L11.4033 20.4395C11.6428 20.6644 11.7625 20.7769 11.9037 20.8046C11.9673 20.8171 12.0327 20.8171 12.0963 20.8046C12.2375 20.7769 12.3572 20.6644 12.5967 20.4395L19.5493 13.9082C21.5055 12.0706 21.743 9.0466 20.0978 6.92607L19.7885 6.52734C17.8203 3.99058 13.8696 4.41601 12.4867 7.31365C12.2913 7.72296 11.7087 7.72296 11.5133 7.31365C10.1304 4.41601 6.17972 3.99058 4.21154 6.52735L3.90219 6.92607C2.25695 9.0466 2.4945 12.0706 4.45067 13.9082Z" stroke-width="2"/>
        </svg>
      </button>
      <nav class="breadcrumb" id="breadcrumb">
        <!-- Генерируется JS -->
      </nav>
    </div>
  </header>

  <main class="container">
    <div id="lots-grid" class="lots-grid">
      <div class="loading-spinner">
        <div class="spinner"></div>
      </div>
    </div>

    <section class="lots-table-section" id="lots-table-section" style="display:none">
      <div class="lots-table-header">
        <h2 class="lots-table-title">Ещё аккаунты</h2>
      </div>

      <div class="lots-table-filters" id="lots-table-filters">
        <div class="filter-row">
          <input type="text" id="lots-filter-q" placeholder="Поиск" autocomplete="off">
        </div>
      </div>

      <div class="lots-table" id="lots-table">
        <!-- Горизонтальные карточки лотов -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Все аккаунты продаются через&nbsp;<img src="https://funpay.com/img/layout/logo-funpay.svg" alt="FunPay" class="funpay-logo-footer">&nbsp;— безопасная сделка гарантирована.</p>
  </footer>

  <script src="../js/resources.js?v=__CACHE_VER__"></script>
  <script src="../js/main.js?v=__CACHE_VER__"></script>
  <script>
    // Загружаем витрину по параметру ?id=shopName
    loadShop();
  </script>
</body>
</html>
